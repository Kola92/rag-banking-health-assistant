services:
  - type: web
    name: rag-banking-health-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: APP_NAME
        value: "RAG Banking & Health Assistant"
      - key: APP_VERSION
        value: "0.1.0"
      - key: DEBUG
        value: "false"
